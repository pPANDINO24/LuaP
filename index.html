<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuaP - The Luau Fork</title>
    <style>
        :root {
            --primary-blue: #007ACC;
            --primary-hover: #005A9E;
            --secondary-green: #21DB0D;
            --secondary-hover: #0F9101;
            --github-bg: #24292e;
            --github-hover: #1b1f23;
            --vsix-purple: #705697;
            --vsix-hover: #563d7c;
            --bg-dark: #121212;
            --bg-card: #1E1E1E;
            --text-main: #E0E0E0;
            --text-muted: #A0A0A0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        .hero-container {
            text-align: center;
            max-width: 800px;
            padding: 3rem 2rem;
            background-color: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        h1 {
            font-size: 4rem;
            color: #FFFFFF;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        .author-tag {
            font-size: 1.2rem;
            color: var(--primary-blue);
            font-weight: 600;
            margin-bottom: 2rem;
            display: block;
        }

        .description {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
            padding: 0 1rem;
        }

        .btn-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            border-radius: 8px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease-in-out;
        }

        .btn-exe {
            background-color: var(--primary-blue);
            color: #FFFFFF;
            border: 2px solid var(--primary-blue);
        }

        .btn-exe:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(0, 122, 204, 0.4);
        }

        .btn-source {
            background-color: var(--secondary-green);
            color: #FFFFFF;
            border: 2px solid var(--secondary-hover);
        }

        .btn-source:hover {
            background-color: var(--secondary-hover);
            border-color: var(--secondary-hover);
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(57, 206, 41, 0.4);
        }

        .btn-github {
            background-color: var(--github-bg);
            color: #FFFFFF;
            border: 2px solid var(--github-bg);
        }

        .btn-github:hover {
            background-color: var(--github-hover);
            border-color: var(--github-hover);
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .btn-vsix {
            background-color: var(--vsix-purple);
            color: #FFFFFF;
            border: 2px solid var(--vsix-hover);
        }

        .btn-vsix:hover {
            background-color: var(--vsix-hover);
            border-color: var(--vsix-hover);
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(112, 86, 151, 0.4);
        }

        footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: #666;
        }

        svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <h1>LuaP</h1>
        <span class="author-tag">Forked & Maintained by pPANDINO24</span>
        
        <p class="description">
            An extended version of [Luau](luau.org) with a 2D engine and support for files.
            Download the latest .exe file or build it yourself from the source code.
        </p>

        <div class="btn-group">
            <a href="https://github.com/pPANDINO24/LuaP" class="btn btn-github">
                <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                GitHub
            </a>

            <a href="https://github.com/pPANDINO24/LuaP/releases/download/LuaP/LuaP.exe" class="btn btn-exe">
                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                Download .exe
            </a>

            <a href="https://github.com/pPANDINO24/LuaP/releases/download/LuaP/LuaPSourceCode.zip" class="btn btn-source">

                Source Code .zip

            <a href="https://github.com/pPANDINO24/LuaP/releases/download/LuaP/LuaP.vsix" class="btn btn-vsix">
                <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V22.5L15 19l5.8 2.35c.13.05.28.05.41 0 .22-.09.39-.32.39-.56V3.5c0-.3-.2-.5-.5-.5zM8 19.34l-3 1.2V6.44l3-1.02v13.92zm7 .52l-5-1.63V4.68l5 1.77v13.41zm4 .8l-2-.81V5.4l2-.8v15.06z"/></svg>
                Extension .vsix
            </a>
        </div>
    </div>
</body>
</html>
